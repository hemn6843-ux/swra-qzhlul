<style>
:root{
  --bg:#0a0a0f;
  --card:#12121a;
  --text:#fff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  text-align:center;
  overflow-x:hidden;
}

/* animated gradient */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,#ff00cc,#00f7ff,#ff6600,#00ff88);
  animation:move 10s infinite linear;
  filter:blur(120px);
  z-index:-2;
}

@keyframes move{
  0%{transform:translate(0,0);}
  50%{transform:translate(-50%,-50%);}
  100%{transform:translate(0,0);}
}

/* blur bg image */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://via.placeholder.com/500") center/cover;
  filter:blur(25px) brightness(0.4);
  z-index:-1;
}

/* toggle */
.toggle{
  position:absolute;
  top:20px;
  left:20px;
  padding:10px 15px;
  background:#ffffff20;
  border-radius:20px;
  cursor:pointer;
}

/* profile */
.profile{
  margin-top:60px;
}

.profile img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:50%;
  padding:4px;
  background:linear-gradient(45deg,#ff00cc,#00f7ff);
  box-shadow:0 0 25px #ff00cc, 0 0 50px #00f7ff;
}

.name{
  font-size:28px;
  margin:10px;
}

.badge{
  color:#00f7ff;
}

/* stats */
.stats{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px;
}

.stat{
  background:#ffffff10;
  padding:10px 15px;
  border-radius:10px;
}

/* links */
.link{
  display:block;
  margin:12px auto;
  padding:14px;
  width:260px;
  border-radius:12px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.link:hover{
  transform:scale(1.08);
}

.insta{background:linear-gradient(45deg,#ff00cc,#ff6600);}
.whatsapp{background:linear-gradient(45deg,#00c853,#00e676);}
.call{background:linear-gradient(45deg,#2979ff,#00e5ff);}
.telegram{background:linear-gradient(45deg,#00b0ff,#2962ff);}
.snap{background:linear-gradient(45deg,#fffc00,#ffd600); color:black}

/* qr */
.qr img{
  width:150px;
  margin-top:20px;
  border-radius:10px;
}

/* light mode */
.light{
  --bg:#ffffff;
  --text:#000;
}

footer{
  margin:30px;
  opacity:0.6;
}
</style>
